<div style="position:absolute;top:0;bottom:0;left:0;right:0;width:100%;height:100%;overflow-x:hidden;">
    <div style="font-weight:bolder;padding:0 10px;color:white;text-shadow:1px 1px black;line-height:50px;font-size:24px;">Directory</div>
    <div class="exit" onclick="'/chat/'.route()"></div>
    <div style="padding:0 0 80px;">
        <div style="padding:20px 0 0;color:white;text-shadow:1px 1px black;text-align:center;line-height:50px;font-size:18px;">Promoted</div>
        <div id="promo" class="rooms promo" onclick="var href = '/chat/room/'+event.target.dataset.before; href.route()"></div>
        <div style="padding:20px 0 0;color:white;text-shadow:1px 1px black;text-align:center;line-height:50px;font-size:18px;">All</div>
        <div id="rooms" class="rooms recent" onclick="var href = '/chat/room/'+event.target.dataset.before; href.route()"></div>
    </div>
</div>
<form class="create_room" onsubmit="event.preventDefault();">
    <input class="room_text" type="text" placeholder="Create a room" style="text-shadow:1px 1px black;color:white;display:inline-block;vertical-align:middle;line-height:50px;text-indent: 20px;padding:0 0px;font-size:18px;width: calc(100% - 60px);">
    <div class="submit"></div>
</form>
<link rel="stylesheet" defer href="/chat/url/css/room-index.css" type="text/css" media="all">
